<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graph Sketch</title>
  <script src="https://www.desmos.com/api/v1.11/calculator.js?apiKey=dcb31709b452b1cf9dc26972add0fda6"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; height: 100vh; background: #f0f0f0;
    }

    #sidebar {
      width: 300px; min-width: 300px; background: #fff;
      border-right: 1px solid #ddd; display: flex; flex-direction: column;
      padding: 20px; gap: 16px; overflow-y: auto;
    }

    #sidebar h2 { font-size: 18px; color: #222; font-weight: 600; }

    #upload-btn {
      display: block; width: 100%; padding: 12px; background: #4A90D9;
      color: #fff; border: none; border-radius: 8px; font-size: 14px;
      cursor: pointer; text-align: center; transition: background 0.2s;
    }
    #upload-btn:hover { background: #357ABD; }
    #upload-btn:disabled { background: #aaa; cursor: not-allowed; }

    #file-input { display: none; }

    #preview-area {
      border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden;
      background: #fafafa; min-height: 200px; display: flex;
      align-items: center; justify-content: center;
    }
    #preview-area img { max-width: 100%; max-height: 240px; object-fit: contain; }
    #preview-area .placeholder { color: #bbb; font-size: 13px; }

    #status {
      font-size: 12px; color: #888; min-height: 18px;
      padding: 6px 10px; background: #f8f8f8; border-radius: 6px;
    }

    #controls {
      border-top: 1px solid #eee; padding-top: 16px; display: flex;
      flex-direction: column; gap: 8px;
    }

    .ctrl-btn {
      padding: 8px 14px; border: 1px solid #ddd; border-radius: 6px;
      background: #fff; cursor: pointer; font-size: 13px; color: #555;
      transition: all 0.15s;
    }
    .ctrl-btn:hover { background: #f5f5f5; border-color: #bbb; }
    .ctrl-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #graph-container {
      width: 100vh;
      height: 100vh;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div id="sidebar">
    <h2>Graph Sketch</h2>
    <button id="upload-btn">이미지 업로드</button>
    <input type="file" id="file-input" accept="image/*">
    <div id="preview-area">
      <span class="placeholder">이미지를 업로드하세요</span>
    </div>
    <div id="status">Ready</div>
    <div id="controls" style="display:none;">
      <button class="ctrl-btn" id="draw-btn" style="margin-bottom:8px;">그리기</button>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:#555;cursor:pointer;">
        <input type="checkbox" id="merge-toggle" checked>
        Merge 단계
      </label>
      <button class="ctrl-btn" id="clear-btn">Clear</button>
    </div>
  </div>
  <div id="graph-container"></div>
  <script src="app.js"></script>
</body>
</html>
